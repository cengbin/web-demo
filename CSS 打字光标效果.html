<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字光标效果</title>
    <style>
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* 打字文本 + 闪烁光标 */
        .typing {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        /* 闪烁的打字光标 */
        .typing::after {
            content: '▌';
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            51%, 100% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
<div class="typing">
    这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本这是正在输入的文本
</div>
</body>
</html>
